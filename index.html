<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeHub - Your Perfect Coffee Break</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Menu Data
        const menuItems = [
            { id: 1, name: "Espresso", price: 3.50, category: "Coffee", image: "☕", description: "Strong Italian classic" },
            { id: 2, name: "Cappuccino", price: 4.25, category: "Coffee", image: "🥛", description: "Espresso + steamed milk" },
            { id: 3, name: "Latte", price: 4.75, category: "Coffee", image: "🧋", description: "Smooth & creamy delight" },
            { id: 4, name: "Matcha Latte", price: 5.25, category: "Tea", image: "🍵", description: "Green tea perfection" },
            { id: 5, name: "Croissant", price: 2.75, category: "Pastry", image: "🥐", description: "Buttery French classic" },
            { id: 6, name: "Chocolate Muffin", price: 3.25, category: "Pastry", image: "🧁", description: "Rich chocolate heaven" },
            { id: 7, name: "Avocado Toast", price: 6.50, category: "Food", image: "🥑", description: "On sourdough with poached egg" },
        ];

        const App = () => {
            const [currentTab, setCurrentTab] = useState('home');
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [order, setOrder] = useState({ name: '', phone: '', address: '' });

            const addToCart = (item) => {
                const existing = cart.find(c => c.id === item.id);
                if (existing) {
                    setCart(cart.map(c => c.id === item.id ? { ...c, quantity: c.quantity + 1 } : c));
                } else {
                    setCart([...cart, { ...item, quantity: 1 }]);
                }
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(c => c.id !== id));
            };

            const updateQuantity = (id, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(id);
                    return;
                }
                setCart(cart.map(c => c.id === id ? { ...c, quantity } : c));
            };

            const placeOrder = (e) => {
                e.preventDefault();
                if (cart.length === 0) return alert('Cart is empty!');
                if (!order.name || !order.phone) return alert('Please fill required fields!');
                
                alert(`Order placed successfully! 🎉\n\nTotal: $${getTotal().toFixed(2)}\nItems: ${cart.length}\n\nWe'll call you soon at ${order.phone}`);
                setCart([]);
                setOrder({ name: '', phone: '', address: '' });
            };

            const getTotal = () => cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const filteredMenu = selectedCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === selectedCategory);

            return (
                <div className="min-h-screen bg-gradient-to-br from-amber-50 to-orange-100">
                    {/* Header */}
                    <header className="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-50">
                        <nav className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="w-12 h-12 bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl flex items-center justify-center text-2xl font-bold text-white shadow-lg">
                                    ☕
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">
                                        CafeHub
                                    </h1>
                                    <p className="text-xs text-gray-500">Your coffee break</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="flex space-x-1 bg-amber-100 p-1 rounded-full">
                                    {['home', 'menu', 'order'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setCurrentTab(tab)}
                                            className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                                                currentTab === tab
                                                    ? 'bg-amber-500 text-white shadow-md'
                                                    : 'text-gray-700 hover:bg-amber-200'
                                            }`}
                                        >
                                            {tab === 'home' ? 'Home' : tab === 'menu' ? 'Menu' : 'Order'}
                                        </button>
                                    ))}
                                </div>
                                <div className="relative">
                                    <button className="relative p-2 text-gray-700 hover:bg-amber-100 rounded-xl transition-all">
                                        <i className="fas fa-shopping-cart text-xl"></i>
                                        {cart.length > 0 && (
                                            <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-6 w-6 flex items-center justify-center text-sm font-bold">
                                                {cart.length}
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </nav>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-6 py-12">
                        {currentTab === 'home' && (
                            <div className="text-center mb-20">
                                <div className="max-w-3xl mx-auto">
                                    <h2 className="text-5xl md:text-6xl font-black bg-gradient-to-r from-amber-600 via-orange-600 to-amber-600 bg-clip-text text-transparent mb-6">
                                        Perfect Coffee Moments
                                    </h2>
                                    <p className="text-xl text-gray-700 mb-8 leading-relaxed">
                                        Freshly roasted beans ☕ | Artisan pastries 🥐 | Cozy atmosphere ✨
                                    </p>
                                    <div className="grid md:grid-cols-3 gap-6 mb-12">
                                        {[
                                            { icon: '☕', title: 'Premium Coffee', desc: 'Single-origin beans roasted daily' },
                                            { icon: '🥐', title: 'Fresh Pastries', desc: 'Baked fresh every morning' },
                                            { icon: '📱', title: 'Quick Order', desc: 'Order online in 30 seconds' }
                                        ].map((feature, i) => (
                                            <div key={i} className="bg-white/70 backdrop-blur-sm p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all hover:-translate-y-2 border border-white/50">
                                                <div className="text-4xl mb-4">{feature.icon}</div>
                                                <h3 className="text-xl font-bold text-gray-800 mb-2">{feature.title}</h3>
                                                <p className="text-gray-600">{feature.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={() => setCurrentTab('menu')}
                                        className="bg-gradient-to-r from-amber-500 to-orange-500 text-white px-12 py-5 text-xl font-bold rounded-3xl shadow-xl hover:shadow-2xl hover:scale-105 transition-all duration-300"
                                    >
                                        View Menu
                                    </button>
                                </div>
                            </div>
                        )}

                        {currentTab === 'menu' && (
                            <div>
                                <div className="flex flex-wrap gap-3 mb-8 justify-center">
                                    {['all', 'Coffee', 'Tea', 'Pastry', 'Food'].map(cat => (
                                        <button
                                            key={cat}
                                            onClick={() => setSelectedCategory(cat)}
                                            className={`px-6 py-3 rounded-full font-medium transition-all ${
                                                selectedCategory === cat
                                                    ? 'bg-amber-500 text-white shadow-lg'
                                                    : 'bg-white/70 text-gray-700 hover:bg-amber-100 shadow-md'
                                            }`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredMenu.map(item => (
                                        <div key={item.id} className="bg-white/70 backdrop-blur-sm rounded-3xl p-8 shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all border border-white/50 group">
                                            <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">{item.image}</div>
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2">{item.name}</h3>
                                            <p className="text-gray-600 mb-4">{item.description}</p>
                                            <div className="flex items-center justify-between">
                                                <span className="text-3xl font-bold text-amber-600">${item.price}</span>
                                                <button
                                                    onClick={() => addToCart(item)}
                                                    className="bg-gradient-to-r from-amber-500 to-orange-500 text-white px-8 py-3 rounded-2xl font-bold hover:shadow-xl hover:scale-105 transition-all shadow-lg"
                                                >
                                                    Add to Cart
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentTab === 'order' && (
                            <div className="max-w-2xl mx-auto">
                                <h2 className="text-4xl font-black text-center mb-12 bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">
                                    Your Order
                                </h2>
                                
                                {/* Cart Items */}
                                <div className="bg-white/70 backdrop-blur-sm rounded-3xl p-8 shadow-xl mb-8">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-12">
                                            <i className="fas fa-shopping-cart text-6xl text-gray-300 mb-4"></i>
                                            <p className="text-xl text-gray-500">Your cart is empty</p>
                                            <button 
                                                onClick={() => setCurrentTab('menu')}
                                                className="mt-4 bg-amber-500 text-white px-8 py-3 rounded-2xl font-bold hover:bg-amber-600"
                                            >
                                                Browse Menu
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            {cart.map(item => (
                                                <div key={item.id} className="flex items-center justify-between p-4 border-b border-gray-100 last:border-b-0">
                                                    <div className="flex items-center space-x-4">
                                                        <div className="text-3xl">{item.image}</div>
                                                        <div>
                                                            <h4 className="font-bold">{item.name}</h4>
                                                            <p className="text-gray-500">${item.price}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center space-x-4">
                                                        <button 
                                                            onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                            className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300"
                                                        >
                                                            -
                                                        </button>
                                                        <span className="font-bold text-xl min-w-[2rem] text-center">{item.quantity}</span>
                                                        <button 
                                                            onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                            className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300"
                                                        >
                                                            +
                                                        </button>
                                                        <button 
                                                            onClick={() => removeFromCart(item.id)}
                                                            className="text-red-500 hover:text-red-700"
                                                        >
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            <div className="mt-8 pt-6 border-t border-gray-200">
                                                <div className="flex justify-between text-2xl font-bold">
                                                    <span>Total:</span>
                                                    <span>${getTotal().toFixed(2)}</span>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>

                                {/* Order Form */}
                                {cart.length > 0 && (
                                    <form onSubmit={placeOrder} className="bg-white/70 backdrop-blur-sm rounded-3xl p-8 shadow-xl">
                                        <h3 className="text-2xl font-bold mb-6 text-gray-800">Delivery Details</h3>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Name *</label>
                                                <input
                                                    type="text"
                                                    value={order.name}
                                                    onChange={(e) => setOrder({...order, name: e.target.value})}
                                                    className="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Phone *</label>
                                                <input
                                                    type="tel"
                                                    value={order.phone}
                                                    onChange={(e) => setOrder({...order, phone: e.target.value})}
                                                    className="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                                                    required
                                                />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Address</label>
                                                <input
                                                    type="text"
                                                    value={order.address}
                                                    onChange={(e) => setOrder({...order, address: e.target.value})}
                                                    className="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                                                    placeholder="Street, City, ZIP"
                                                />
                                            </div>
                                        </div>
                                        <button 
                                            type="submit"
                                            className="w-full mt-8 bg-gradient-to-r from-amber-500 to-orange-500 text-white py-5 text-xl font-bold rounded-3xl shadow-xl hover:shadow-2xl hover:scale-105 transition-all"
                                        >
                                            Place Order - ${getTotal().toFixed(2)}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="mt-24 bg-gradient-to-r from-amber-900/20 to-orange-900/20 backdrop-blur-sm border-t border-white/20">
                        <div className="max-w-6xl mx-auto px-6 py-12 text-center">
                            <div className="text-3xl mb-4">☕</div>
                            <h3 className="text-2xl font-bold text-white mb-4">CafeHub</h3>
                            <p className="text-white/80 mb-6">Serving happiness, one cup at a time</p>
                            <div className="flex justify-center space-x-6 text-white/70 text-xl">
                                <i className="fab fa-instagram hover:text-white transition-colors"></i>
                                <i className="fab fa-facebook hover:text-white transition-colors"></i>
                                <i className="fab fa-twitter hover:text-white transition-colors"></i>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
